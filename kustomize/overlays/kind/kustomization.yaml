apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
images:
  - name: ghcr.io/unstoppablemango/wireguard-cni:latest
    newName: wireguard-cni
    newTag: "0.0.1"
patches:
  - patch: |-
      - op: add
        path: /spec/template/spec/initContainers/0/imagePullPolicy
        value: Never
    target:
      kind: DaemonSet
      name: wireguard-cni
