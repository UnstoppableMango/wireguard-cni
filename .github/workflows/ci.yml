name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: cachix/install-nix-action@v31.10.3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - run: make bin/wireguard-cni

      - if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: wireguard-cni
          path: bin/wireguard-cni

  arm:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: cachix/install-nix-action@v31.10.3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - run: make bin/wireguard-cni

      - uses: actions/upload-artifact@v4
        with:
          name: wireguard-cni-arm
          path: bin/wireguard-cni

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, arm]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wireguard-cni
          path: bin/amd64

      - uses: actions/download-artifact@v4
        with:
          name: wireguard-cni-arm
          path: bin/arm64

      - name: Package archives
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          tar -czf "dist/wireguard-cni_${VERSION}_linux_amd64.tar.gz" -C bin/amd64 wireguard-cni
          tar -czf "dist/wireguard-cni_${VERSION}_linux_arm64.tar.gz" -C bin/arm64 wireguard-cni
          sha256sum dist/*.tar.gz > dist/checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2.6.1
        with:
          files: dist/*

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: redhat-actions/podman-install@main

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - run: sudo modprobe wireguard && make test

  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: cachix/install-nix-action@v31.10.3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - run: make check

  clean:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: cachix/install-nix-action@v31.10.3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - run: nix develop -c make gomod2nix.toml
      - run: git diff --exit-code

  container:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6.0.2

      # Install outside of Nix for runner deps
      - uses: redhat-actions/podman-install@main

      - uses: cachix/install-nix-action@v31.10.3
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: |
            ghcr.io/unstoppablemango/wireguard-cni
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
          flavor: |
            latest=true

      - run: nix develop -c make load

      - name: Tag image
        if: github.event_name == 'push'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        shell: bash
        run: >
          tr '\n' '\0' <<<"$TAGS"
          | xargs -0 podman image tag wireguard-cni:latest

      - name: Push to registry
        if: github.event_name == 'push'
        uses: redhat-actions/push-to-registry@v2
        with:
          tags: ${{ steps.meta.outputs.tags }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
